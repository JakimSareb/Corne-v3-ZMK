name: Draw Keymap

on:
  workflow_dispatch:
  push:
    paths:
      - "config/**/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and draw keymap
        run: |
          keymap parse -z config/corne.keymap > /tmp/corne_keymap.yaml
          keymap draw /tmp/corne_keymap.yaml > corne_keymap.svg

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corne_keymap.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update keymap SVG [skip ci]"
            git push
          fi
